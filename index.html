        const errorMsg = document.getElementById('error-msg');
        const digitBoxes = document.querySelectorAll('.digit-box');
        const cursor = document.querySelector('.cursor');
        const archiveIndex = document.getElementById('archive-index');
        const fileList = document.getElementById('file-list');

        // --- LOCKOUT LOGIC ---
        function checkLockout() {
            const lockedUntil = localStorage.getItem(LOCKOUT_KEY);
            if (lockedUntil && Date.now() < parseInt(lockedUntil)) {
                showLockout(parseInt(lockedUntil));
                return true;
            }
            if (lockedUntil && Date.now() >= parseInt(lockedUntil)) {
                localStorage.removeItem(LOCKOUT_KEY);
            }
            return false;
        }

        function setLockout() {
            localStorage.setItem(LOCKOUT_KEY, Date.now() + LOCKOUT_DURATION);
        }

        function showLockout(until) {
            dataStream.style.display = 'none';
            lockoutOverlay.style.display = 'flex';
            
            const updateTimer = () => {
                const remaining = until - Date.now();
                if (remaining <= 0) {
                    localStorage.removeItem(LOCKOUT_KEY);
                    location.reload();
                    return;
                }
                const h = Math.floor(remaining / 3600000).toString().padStart(2, '0');
                const m = Math.floor((remaining % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((remaining % 60000) / 1000).toString().padStart(2, '0');
                countdownEl.innerText = `${h}:${m}:${s}`;
            };
            
            updateTimer();
            setInterval(updateTimer, 1000);
        }

        // --- TYPEWRITER EFFECT ---
        const decodedPayload = atob(base64Payload);
        let index = 0;
        function typeWriter() {
            if (index < decodedPayload.length) {
                const speed = Math.random() * 8 + 2;
                const char = decodedPayload.charAt(index);
                const textNode = document.createTextNode(char);
                dataStream.insertBefore(textNode, cursor);
                index++;
                dataStream.scrollTop = dataStream.scrollHeight;
                setTimeout(typeWriter, speed);
            } else {
                setTimeout(() => {
                    setLockout();
                    showLockout(Date.now() + LOCKOUT_DURATION);
                }, 2000);
            }
        }

        // --- DIGIT BOX AUTO-FOCUS LOGIC ---
        digitBoxes.forEach((box, i) => {
            box.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                if (e.target.value) {
                    e.target.classList.add('valid');
                } else {
                    e.target.classList.remove('valid');
                }
                if (e.target.value && i < digitBoxes.length - 1) {
                    digitBoxes[i + 1].focus();
                }
            });
            
            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && i > 0) {
                    digitBoxes[i - 1].classList.remove('valid');
                    digitBoxes[i - 1].focus();
                }
            });
        });

        // --- CODE VALIDATION & UNLOCK ---
        submitBtn.addEventListener('click', () => {
            let enteredCode = '';
            digitBoxes.forEach(box => enteredCode += box.value);

                });

                setTimeout(() => { errorMsg.style.display = 'none'; }, 2000);

            if (!file.unlocked) {
