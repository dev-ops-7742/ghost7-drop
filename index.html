const screen = document.getElementById("screen");
const lockout = document.getElementById("lockout");

function typeText(el, text, done){
  el.innerHTML = "";
  const cursor = document.createElement("span");
  cursor.className = "cursor";
  el.appendChild(cursor);
  let i = 0;
  function tick(){
    if(i < text.length){
      el.insertBefore(document.createTextNode(text[i]), cursor);
      i++;
      el.scrollTop = el.scrollHeight;
      setTimeout(tick, Math.random()*8+2);
    } else {
      cursor.remove();
      if(done) done();
    }
  }
  tick();
}

function start(){
  const lockedUntil = localStorage.getItem(LOCK_KEY);
  if(lockedUntil && Date.now() < Number(lockedUntil)){
    showLock(Number(lockedUntil));
    return;
  }
  localStorage.removeItem(LOCK_KEY);
  const fullText = plainHeader + base64Payload + `\n\n--------------------------------\nEND RECOVERED TRANSMISSION\n--------------------------------`;
  typeText(screen, fullText, () => {
    setTimeout(() => {
      const until = Date.now() + LOCK_TIME;
      localStorage.setItem(LOCK_KEY, until);
      showLock(until);
    }, 3000);
  });
}

function showLock(until){
  screen.style.display = "none";
  floor1.style.display = "none";
  lockout.style.display = "flex";
  updateCountdown(until);
  setInterval(() => updateCountdown(until), 1000);
}

function updateCountdown(until){
  let r = until - Date.now();
  if(r < 0){ localStorage.removeItem(LOCK_KEY); location.reload(); return; }
  let h = String(Math.floor(r/3600000)).padStart(2,"0");
  let m = String(Math.floor((r%3600000)/60000)).padStart(2,"0");
  let s = String(Math.floor((r%60000)/1000)).padStart(2,"0");
  document.getElementById("countdown").innerText = `${h}:${m}:${s}`;
}

    if(b.value && i<boxes.length-1) boxes[i+1].focus();
  });
});

async function checkCode(){
  let entered = "";
  boxes.forEach(b => entered += b.value);
  const data = new TextEncoder().encode(entered);
  const buffer = await crypto.subtle.digest("SHA-256", data);
  const hash = Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2,"0")).join("");
  if(hash === ACCESS_HASH){
    localStorage.removeItem(LOCK_KEY);
    lockout.style.display = "none";
    openFloor1();

    document.getElementById("error").style.display = "block";
    boxes.forEach(b=>b.value="");
    boxes[0].focus();
    setTimeout(()=>document.getElementById("error").style.display="none",2000);
  }
}
