<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ÆTHELGARD ARCHIVE // SECURE DROP</title>
    <!-- 
        DECOY: KEY = 00000000000 (FAKE - IGNORE)
        REAL KEY IS HIDDEN IN BEHAVIOR & STRUCTURE
    -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; color: #0f0; font-family: 'Courier New', monospace; 
            font-size: 14px; overflow: hidden; height: 100vh; display: flex; 
            justify-content: center; align-items: center; user-select: none;
        }
        
        /* CRT Scanlines */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.3));
            background-size: 100% 4px; pointer-events: none; z-index: 10;
        }
        
        /* Screen Flicker */
        @keyframes flicker {
            0% { opacity: 0.97; } 5% { opacity: 0.95; } 10% { opacity: 0.9; }
            15% { opacity: 0.95; } 20% { opacity: 0.99; } 50% { opacity: 0.95; }
            80% { opacity: 0.9; } 100% { opacity: 0.97; }
        }
        body { animation: flicker 0.15s infinite; }

        /* Main Data Stream Container */
        #data-stream {
            width: 90%; max-width: 800px; height: 80vh;
            overflow-y: auto; white-space: pre-wrap; word-break: break-all;
            text-shadow: 0 0 5px #0f0; opacity: 0.9;
            scrollbar-width: none;
        }
        #data-stream::-webkit-scrollbar { display: none; }

        /* Lockout Overlay */
        #lockout-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 20; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            transition: opacity 1s ease-out;
        }
        
        #lockout-overlay h1 { 
            color: #ff3333; font-size: 28px; text-transform: uppercase; 
            text-shadow: 0 0 10px #ff0000; margin-bottom: 20px; 
        }
        
        #lockout-overlay p { color: #c0c0c0; font-size: 16px; margin: 10px 0; }
        
        #countdown { 
            font-size: 48px; color: #ff3333; font-weight: bold; 
            letter-spacing: 5px; margin: 30px 0; text-shadow: 0 0 15px #ff0000;
        }

        /* 11-Digit Input Grid */
        #code-grid {
            display: flex; gap: 8px; margin-top: 30px; flex-wrap: wrap; justify-content: center;
        }
        
        .digit-box {
            width: 35px; height: 45px; background: #111; border: 1px solid #ff3333;
            color: #ff3333; font-family: 'Courier New', monospace; font-size: 20px;
            text-align: center; outline: none; text-shadow: 0 0 5px #ff3333;
            transition: all 0.2s ease;
        }
        
        .digit-box:focus { border-color: #fff; background: #1a0000; color: #fff; }
        .digit-box.valid { border-color: #0f0; color: #0f0; text-shadow: 0 0 5px #0f0; }
        
        #submit-btn {
            margin-top: 30px; background: #ff3333; color: #000; border: none;
            font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold;
            padding: 10px 40px; cursor: pointer; text-transform: uppercase;
            text-shadow: 0 0 5px #ff3333;
        }
        
        #submit-btn:hover { background: #fff; }
        
        #error-msg { color: #ff3333; margin-top: 20px; display: none; font-size: 18px; text-shadow: 0 0 5px #ff0000; }
        
        .hint-text { 
            color: #555; font-size: 12px; margin-top: 15px; font-style: italic; 
        }

        /* Archive Index Styles (Hidden Initially) */
        #archive-index {
            display: none; width: 90%; max-width: 800px; height: 80vh;
            overflow-y: auto; scrollbar-width: none;
        }
        #archive-index::-webkit-scrollbar { display: none; }
        
        .index-header { 
            color: #0f0; font-size: 18px; margin-bottom: 20px; 
            text-shadow: 0 0 5px #0f0; border-bottom: 1px solid #0f0; padding-bottom: 10px;
        }
        
        .file-row {
            display: flex; justify-content: space-between; padding: 8px 0;
            border-bottom: 1px solid #1a1a1a; cursor: pointer;
        }
        .file-row:hover { background: #0a0a0a; }
        .file-name { color: #4a9eff; }
        .file-status { color: #ff3333; font-size: 12px; }
        .file-status.unlocked { color: #0f0; }

        .cursor {
            display: inline-block; width: 10px; height: 18px;
            background: #0f0; animation: blink 0.8s infinite;
            vertical-align: middle; margin-left: 2px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        /* STEGANOGRAPHIC CSS ENCODING */
        /* Opacity values encode first 4 digits: 0.46, 0.23, 0.19, 0.60 */
        .steg-layer-1 { opacity: 0.46; }
        .steg-layer-2 { opacity: 0.23; }
        .steg-layer-3 { opacity: 0.19; }
        .steg-layer-4 { opacity: 0.60; }
        /* Letter-spacing encodes next 4 digits: 5.7px, 8px */
        .steg-layer-5 { letter-spacing: 5.7px; }
        .steg-layer-6 { letter-spacing: 8px; }
        /* Zero-width chars in content encode last 3 digits: 5,7,8 */
        .steg-layer-7::after { content: "\200B\200C\200B"; }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    
    <!-- Base64 Data Stream -->
    <div id="data-stream"><span class="cursor"></span></div>

    <!-- Lockout Screen -->
